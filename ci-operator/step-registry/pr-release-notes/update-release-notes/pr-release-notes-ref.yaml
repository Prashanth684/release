ref:
  as: pr-release-notes
  from: claude-ai-helpers
  commands: pr-release-notes-commands.sh
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
  credentials:
    - namespace: test-credentials
      name: pr-release-notes-bot
      mount_path: /var/run/release-notes-credentials
  timeout: 10m0s
  grace_period: 1m0s
  env:
    - name: CLAUDE_CODE_USE_VERTEX
      default: "1"
      documentation: |-
        Enable Vertex AI for Claude Code.
    - name: CLOUD_ML_REGION
      default: "us-east5"
      documentation: |-
        Google Cloud region for Vertex AI.
    - name: ANTHROPIC_VERTEX_PROJECT_ID
      default: "itpc-gcp-hybrid-pe-eng-claude"
      documentation: |-
        Google Cloud project ID for Vertex AI authentication.
    - name: GOOGLE_APPLICATION_CREDENTIALS
      default: "/var/run/release-notes-credentials/claude-prow"
      documentation: |-
        Path to the Google Cloud service account JSON key file for Vertex AI authentication.
    - name: GITHUB_APP_CREDS_DIR
      default: "/var/run/release-notes-credentials"
      documentation: |-
        Directory containing GitHub App credentials (app-id, installation-id, private-key)
    - name: RELEASE_NOTES_FILE
      default: "RELEASE_NOTES.md"
      documentation: |-
        Name of the release notes file to update (default: RELEASE_NOTES.md)
    - name: RELEASE_NOTES_CONTEXT_FILE
      default: ".release-notes-context.md"
      documentation: |-
        Path to repository-specific context file that describes the product, target audience,
        and what constitutes user-facing changes. Helps Claude generate more accurate release notes.
    - name: GIT_USER_NAME
      default: "OpenShift CI Bot"
      documentation: |-
        Git user name for commits
    - name: GIT_USER_EMAIL
      default: "ci-robot@openshift.io"
      documentation: |-
        Git user email for commits
    - name: CLAUDE_MODEL
      default: "claude-sonnet-4-20250514"
      documentation: |-
        Claude model to use for generating release notes
  documentation: |-
    Automatically generates user-facing release notes from PR changes using Claude AI.
    Analyzes PR content (diff, description, title) and intelligently updates a rolling
    RELEASE_NOTES.md file with user-focused documentation. Commits and pushes the updated
    file back to the PR branch.

    Key Features:
    - Analyzes PR changes directly (no external tools needed)
    - Generates user-facing documentation (what users see/experience, not code details)
    - Intelligently merges changes to avoid duplication
    - Organizes by user impact categories (New Features, Bug Fixes, etc.)
    - Focuses on customer value and product changes

    Prerequisites:
    - Requires secret in test-credentials namespace with:
      * claude-prow: GCP service account for Vertex AI
      * app-id: GitHub App ID
      * installation-id: GitHub App installation ID for target repo
      * private-key: GitHub App private key

    This step should be configured as an optional presubmit job.
